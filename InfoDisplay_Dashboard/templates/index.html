
{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
{% endblock %}

{% block body %}


<!-- Starry background generated via JS -->
<div id="stars" class="stars-container"></div>

<!-- Subtle glow spots -->
<div class="nebula-glow" style="top: 10%; right: 10%;"></div>
<div class="nebula-glow" style="bottom: 10%; left: 10%; background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, rgba(0, 0, 0, 0) 70%);"></div>

<main class="text-center px-6">
    <div class="glass-panel p-12 md:p-20 rounded-3xl max-w-2xl mx-auto border border-white/10">
        <h1 class="text-5xl md:text-7xl font-light tracking-tighter mb-4 text-white">
            InAxon
        </h1>
        <p class="text-blue-300/80 text-lg md:text-xl font-light mb-12 tracking-wide uppercase">
            Interpretator de Dados
        </p>

        <div class="flex flex-col sm:flex-row gap-6 justify-center">
            <a href="/charts" onclick="showMessage('Navigating to Astronomical Charts...')" class="btn-astronomy text-white px-10 py-4 rounded-full text-lg font-medium tracking-wide flex items-center justify-center">
                <svg class="w-5 h-5 mr-3 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                Ver Charts
            </a>
            
            <a href="/image_display" onclick="showMessage('Loading Deep Space Imagery...')" class="btn-astronomy text-white px-10 py-4 rounded-full text-lg font-medium tracking-wide flex items-center justify-center">
                <svg class="w-5 h-5 mr-3 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Ver Images
            </a>
        </div>
    </div>

    <p class="mt-8 text-white/30 text-sm font-light tracking-widest">
        ANALIZA DE FORMA EFICIENTE
    </p>
</main>

<!-- Custom Message Box (Instead of Alert) -->
<div id="messageBox" class="message-overlay glass-panel text-white text-lg font-light border-blue-500/30">
    <span id="messageContent"></span>
</div>

<script src="{{ url_for('static', filename='js/index.js') }}"></script>

{% endblock %}
