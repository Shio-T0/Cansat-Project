{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/axis_analizis.css') }}">
{% endblock %}


{% block body %}

<div id="canvas-container"></div>

<!-- UI Overlay -->
<main class="ui-layer h-screen w-screen p-6 md:p-10 flex flex-col justify-between">
    
    <!-- Top Bar -->
    <header class="flex justify-between items-start animate-fade-in">
        <div class="glass p-6 interactive">
            <div class="flex items-center mb-1">
                <span class="status-dot"></span>
                <span class="text-xs uppercase tracking-widest text-gray-400">System Live</span>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight word-spaced">InAXON IVAM <span class="text-blue-400">v2.0</span></h1>
            <p class="text-sm text-gray-400">Interactive Vector Analysis Model</p>
        </div>

        <div class="glass p-6 interactive text-right">
            <div class="text-xs uppercase tracking-widest text-gray-400 mb-1">Coordenadas Atuais</div>
            <div class="text-lg font-bold"> ( x, y, z ) </div>
            <div class="text-xs text-blue-400 mt-1"> DEGºN / DEGºS </div>
        </div>
    </header>

    <!-- Sidebar / Controls -->
    <div class="flex flex-col gap-4 w-full md:w-80 animate-slide-up">
        <div class="glass p-6 interactive">
            <h3 class="text-xs font-bold uppercase tracking-widest text-gray-500 mb-4">Vector Analysis</h3>
            
            <!-- X Axis -->
            <div class="mb-4">
                <div class="flex justify-between text-xs mb-1">
                    <span class="axis-label text-red-500">X-AXIS</span>
                    <span id="val-x" class="value-display">0.00°</span>
                </div>
                <div class="h-1 w-full bg-gray-800 rounded-full overflow-hidden">
                    <div id="bar-x" class="h-full bg-red-500 transition-all duration-300" style="width: 50%"></div>
                </div>
            </div>

            <!-- Y Axis -->
            <div class="mb-4">
                <div class="flex justify-between text-xs mb-1">
                    <span class="axis-label text-green-500">Y-AXIS</span>
                    <span id="val-y" class="value-display">0.00°</span>
                </div>
                <div class="h-1 w-full bg-gray-800 rounded-full overflow-hidden">
                    <div id="bar-y" class="h-full bg-green-500 transition-all duration-300" style="width: 50%"></div>
                </div>
            </div>

            <!-- Z Axis -->
            <div class="mb-0">
                <div class="flex justify-between text-xs mb-1">
                    <span class="axis-label text-blue-500">Z-AXIS</span>
                    <span id="val-z" class="value-display">0.00°</span>
                </div>
                <div class="h-1 w-full bg-gray-800 rounded-full overflow-hidden">
                    <div id="bar-z" class="h-full bg-blue-500 transition-all duration-300" style="width: 50%"></div>
                </div>
            </div>
        </div>

    </div>
</main>

<script src="{{ url_for('static', filename='js/axis_analizis.js') }}"></script>
{% endblock %}
